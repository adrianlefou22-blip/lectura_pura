name: Build Lectura Pura APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias Capacitor
        run: npm install

      - name: Agregar plataforma Android
        run: npx cap add android

      - name: Copiar archivos web
        run: npx cap copy android

      - name: Parchear AndroidManifest
        run: python3 patch-manifest.py

      - name: Inyectar TTS nativo en MainActivity
        run: python3 patch-mainactivity.py

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Build APK debug
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: LecturaPura-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
